<section class="product-list">
  @for (product of products(); track product.id) {
    <app-product-card [product]="product"></app-product-card>
  }
</section>

<footer class="p-5 mt-3">
  <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">
    <!--  LIMIT -->
    <div class="d-flex align-items-center gap-2">
      <label class="fw-bold mb-0">Items per page:</label>

      <select
        class="form-select w-auto"
        [ngModel]="limit()"
        (ngModelChange)="onLimitChange($event)"
      >
        <option [value]="4">4</option>
        <option [value]="8">8</option>
        <option [value]="12">12</option>
        <option [value]="20">20</option>
      </select>
    </div>

    <!--PAGINATION  -->
    <nav>
      <ul class="pagination mb-0">
        <li class="page-item">
          <button class="page-link" (click)="previousPage()" [class.disabled]="currentPage() === 1">
            Previous
          </button>
        </li>

        <li class="page-item disabled">
          <span class="page-link fw-bold"> Page {{ currentPage() }} </span>
        </li>
        <li class="page-item">
          <button class="page-link" (click)="nextPage()" [class.disabled]="isLastPage()">
            Next
          </button>
        </li>
      </ul>
    </nav>
  </div>
</footer>
