<div class="card shadow-sm">
  <div class="card-header bg-primary text-white">
    <h5 class="mb-0">Order Summary</h5>
  </div>

  <div class="card-body">
    <div class="d-flex justify-content-between mb-2">
      <span>Subtotal</span><span class="fw-bold">{{ total() }}€</span>
    </div>
    <div class="d-flex justify-content-between mb-2">
      <span>Shipping</span><span class="fw-bold">10€</span>
    </div>
    <div class="d-flex justify-content-between mb-2">
      <span>Tax</span><span class="fw-bold">0€</span>
    </div>

    <div class="d-flex justify-content-between border-top border-2 py-2 mt-2">
      <span class="fw-bold">Total</span>
      <span class="fw-bold text-primary">{{ total() + shipping + tax }}€</span>
    </div>

    <button class="btn btn-primary w-100 mt-2">Proceed to checkout</button>
  </div>
</div>
