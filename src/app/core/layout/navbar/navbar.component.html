<nav class="navbar navbar-expand-lg bg-body-tertiary">
  <div class="container-fluid">
    <!-- Brand -->
    <a class="navbar-brand fw-bold ms-5" href="#">SHOP</a>

    <!-- Toggle -->
    <button
      class="navbar-toggler"
      type="button"
      (click)="toggleNavbar()"
      aria-label="Toggle navigation"
    >
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- Navbar Content -->
    <div
      class="collapse navbar-collapse me-5"
      [class.show]="showNavbar()"
      id="navbarSupportedContent"
    >
      <ng-container *ngTemplateOutlet="navbarContent"></ng-container>
    </div>
  </div>
</nav>

<!-- Shared Content -->
<ng-template #navbarContent>
  <!-- Links -->
  <ul class="navbar-nav ms-auto mb-3 mb-lg-0 text-start">
    <li class="nav-item">
      <a
        class="nav-link fw-bold"
        routerLink="/categories"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true, queryParams: 'exact' }"
      >
        Categories
      </a>
    </li>

    <li class="nav-item">
      <a class="nav-link fw-bold mx-lg-3" href="#">About</a>
    </li>

    <li class="nav-item">
      <a class="nav-link fw-bold" href="#">Contact</a>
    </li>
  </ul>

  <!-- Right Side -->
  <div class="d-flex flex-column flex-lg-row align-items-start align-items-lg-center gap-3 ms-lg-4">
    <button
      class="btn btn-outline-primary rounded-circle d-flex align-items-center justify-content-center"
      style="width: 45px; height: 45px"
      type="button"
    >
      <fa-icon [icon]="faUser" size="2x"></fa-icon>
    </button>

    <a
      class="position-relative d-inline-flex align-items-center"
      routerLink="/cart"
      routerLinkActive="active-cart"
    >
      <fa-icon [icon]="faCartShopping" size="2x" class="cart-icon"></fa-icon>

      @if (cartCount() > 0) {
        <span
          class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
        >
          {{ cartCount() }}
        </span>
      }
    </a>
  </div>
</ng-template>
