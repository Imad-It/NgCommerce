<section class="table-responsive">
  <table
    class="table table-hover align-middle border border-2 rounded rounded-5 overflow-hidden shadow-sm"
  >
    <thead class="table-light">
      <tr>
        <th>Image</th>
        <th>Title</th>
        <!-- Category only visible from lg and above -->
        <th class="d-none d-lg-table-cell">Category</th>
        <th>Price</th>
        <th class="text-center">Actions</th>
      </tr>
    </thead>
    <tbody>
      @for (product of products(); track product.id) {
        <tr app-admin-product-row [product]="product"></tr>
      }
    </tbody>
  </table>
</section>
