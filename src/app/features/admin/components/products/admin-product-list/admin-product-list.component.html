<section class="table-responsive">
  <table class="table table-hover align-middle border rounded-4 overflow-hidden shadow-sm">
    <thead class="table-light">
      <tr>
        <th>Image</th>
        <th>Title</th>

        <!-- Category only visible from lg and above -->
        <th class="d-none d-lg-table-cell">Category</th>

        <th>Price</th>
        <th class="text-center">Actions</th>
      </tr>
    </thead>

    <tbody>
      @for (product of products(); track product.id) {
        <app-admin-product-row [product]="product"></app-admin-product-row>
      }
    </tbody>
  </table>
</section>
