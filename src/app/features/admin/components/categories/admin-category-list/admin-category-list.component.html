<section>
  @for (category of categories(); track category.id) {
    <app-admin-category-card
      [category]="category"
      (deleteInitiated)="openDeleteDialog(category)"
    ></app-admin-category-card>
  }
  @if (showModal()) {
    <app-confirm-dialog
      [modalData]="dialogData()"
      (cancelled)="closeDialog()"
      (confirmed)="deleteCategory()"
    ></app-confirm-dialog>
  }
</section>
