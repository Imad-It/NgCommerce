<section class="table-responsive">
  <table class="table table-hover align-middle border border-2 overflow-hidden shadow-sm w-100">
    <thead class="table-light">
      <tr>
        <th>Image</th>
        <th>Title</th>
        <th class="text-center">Actions</th>
      </tr>
    </thead>
    <tbody>
      @for (category of categories(); track category.id) {
        <tr
          app-admin-category-row
          [category]="category"
          (deleteInitiated)="openDeleteDialog($event)"
        ></tr>
      }
    </tbody>
  </table>
</section>
@if (showModal()) {
  <app-confirm-dialog
    [modalData]="dialogData()"
    (cancelled)="closeDialog()"
    (confirmed)="deleteCategory()"
  ></app-confirm-dialog>
}
