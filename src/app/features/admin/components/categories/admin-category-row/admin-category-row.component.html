<!-- Content -->
<td>
  @if (typeof category().image === 'string' && category().image.trim().startsWith('http')) {
    <img [src]="category().image" class="img rounded border" crossorigin="anonymous" />
  } @else {
    <div
      class="d-flex align-items-center justify-content-center rounded border bg-light"
      style="width: 110px; height: 80px"
    >
      No Image
    </div>
  }
</td>
<td>
  <h5 class="mb-1 fw-semibold">{{ category().name }}</h5>
</td>

<td class="text-center">
  <div class="d-flex justify-content-center gap-2">
    <button
      class="btn btn-sm btn-outline-warning"
      [routerLink]="['/admin/categories', category().id, 'edit']"
    >
      <fa-icon [icon]="faEdit"></fa-icon>
      <span class="d-none d-md-inline ms-1">Edit</span>
    </button>

    <!-- Button trigger modal -->
    <button
      type="button"
      class="btn btn-sm btn-outline-danger"
      (click)="initiateDelete(category())"
    >
      <fa-icon [icon]="faTrash"></fa-icon>
      <span class="d-none d-md-inline ms-1">Delete</span>
    </button>
  </div>
</td>
