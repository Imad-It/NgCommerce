<div
  class="card category-card shadow-sm h-100 d-flex flex-column cursor-pointer"
  style="
    width: 288px;
    height: 300px !important;
    border-radius: 18px;
    overflow: hidden;
    border: 1px solid #e7dada;
  "
>
  <img
    [src]="category().image"
    class="card-img-top w-100 h-100"
    alt="..."
    style="height: 240px !important"
  />
  <div class="card-body">
    <h5 class="card-title text-center">{{ category().name }}</h5>
  </div>
</div>
