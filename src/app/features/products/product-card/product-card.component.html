<div
  class="card product-card shadow-sm h-100 d-flex flex-column cursor-pointer"
  style="width: 288px; border-radius: 18px; overflow: hidden; border: 1px solid #e7dada"
>
  <!-- Carousel -->
  <div class="carousel slide" [id]="'carousel' + product().id">
    <div class="carousel-inner bg-light">
      @for (image of product().images; track $index) {
        <div class="carousel-item" [class.active]="$index === 0">
          <img [src]="image" class="d-block w-100" style="height: 260px; object-fit: cover" />
        </div>
      }
    </div>

    <button
      class="carousel-control-prev"
      type="button"
      [attr.data-bs-target]="'#carousel' + product().id"
      data-bs-slide="prev"
    >
      <span class="carousel-control-prev-icon"></span>
    </button>

    <button
      class="carousel-control-next"
      type="button"
      [attr.data-bs-target]="'#carousel' + product().id"
      data-bs-slide="next"
    >
      <span class="carousel-control-next-icon"></span>
    </button>
  </div>

  <!-- Body -->
  <div class="card-body d-flex flex-column p-3">
    <!-- Title -->
    <h5 class="card-title fw-bold mb-2" style="min-height: 52px">
      {{ product().title }}
    </h5>

    <!-- Description -->
    <p class="card-text text-muted small mb-2" style="min-height: 60px">
      {{
        expanded
          ? product().description
          : product().description.split(' ').slice(0, 12).join(' ') + '...'
      }}
    </p>

    <a
      (click)="toggle()"
      class="text-decoration-none small fw-semibold mb-3"
      style="cursor: pointer"
    >
      {{ expanded ? 'Show less' : 'Read more' }}
    </a>

    <!-- Price -->
    <div class="mb-3">
      <span class="fs-4 fw-bold text-danger"> {{ product().price }} € </span>
    </div>

    <!-- Button -->
    <button class="btn btn-primary w-100 mt-auto rounded-pill py-2" (click)="addToCart(product())">
      <fa-icon [icon]="faCartShopping"></fa-icon>
      Add to Cart
    </button>
  </div>
</div>
