<div class="card shadow-sm m-2">
  <div class="card-body py-2 px-3">
    <div class="row g-4 align-items-start">
      <!-- Search -->
      <div class="col-12 col-lg-3">
        <label for="searchInput" class="form-label fw-semibold mb-1 small"> Search </label>

        <div class="position-relative">
          <input
            type="text"
            id="searchInput"
            class="form-control form-control-sm pe-5"
            placeholder="Search..."
            [ngModel]="searchTerm()"
            (ngModelChange)="onSearch($event)"
          />

          <fa-icon
            [icon]="faMagnifyingGlass"
            class="position-absolute top-50 end-0 translate-middle-y me-3 text-muted small"
          ></fa-icon>
        </div>
      </div>

      <!-- Price -->
      <div class="col-12 col-lg-5">
        <label class="form-label fw-semibold mb-1 small"> Price range </label>

        <ngx-slider
          [(value)]="price_min"
          [(highValue)]="price_max"
          [options]="options"
          (valueChange)="onPriceMinChange($event)"
          (highValueChange)="onPriceMaxChange($event)"
        >
        </ngx-slider>

        <div class="input-group input-group-sm mt-1 w-75">
          <input
            type="number"
            class="form-control text-center"
            min="0"
            max="500"
            step="10"
            [ngModel]="price_min()"
            (ngModelChange)="onPriceMinChange($event)"
          />

          <span class="input-group-text"><b>-</b></span>

          <input
            type="number"
            class="form-control text-center"
            min="0"
            max="500"
            step="10"
            [ngModel]="price_max()"
            (ngModelChange)="onPriceMaxChange($event)"
          />
        </div>
      </div>

      <!-- Category + Button -->
      <div class="col-12 col-lg-4 d-flex flex-column justify-content-between h-100">
        <!-- Category -->
        <div>
          <label class="form-label fw-semibold mb-1 small"> Category </label>

          <select
            class="form-select form-select-sm"
            [ngModel]="selectedCategory()"
            (ngModelChange)="onSelectChange($event)"
          >
            <option value="">All Categories</option>

            @for (category of categories(); track category.id) {
              <option [value]="category.slug">
                {{ category.name }}
              </option>
            }
          </select>
        </div>

        <!-- Reset Button -->
        <div class="d-grid d-md-flex justify-content-md-end mt-4">
          <button class="btn btn-sm btn-outline-primary w-100 w-md-auto" (click)="resetFilters()">
            <fa-icon [icon]="faArrowRotateRight" class="me-1"></fa-icon>
            Reset Filters
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
